<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WebRTC P2P File Transfer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    #chatBox { height: 220px; overflow-y: auto; }
    .msg { margin-bottom: 8px; }
    .muted { color:#666; font-size: 13px; }
    progress { width: 100%; height: 18px; }

    .dot {
      display:inline-block;
      width:10px; height:10px;
      border-radius:50%;
      background:#dc3545;
      margin-right:6px;
      vertical-align:middle;
    }
    .dot.green { background:#198754; }

    #modalBg {
      position: fixed; inset:0; background: rgba(0,0,0,0.35);
      display:none; align-items:center; justify-content:center;
      z-index: 1050;
    }
    #modal {
      background:#fff; width: min(520px, 92vw);
      border-radius: 12px; padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body class="bg-light">
  <div class="container py-4">
    <h2 class="mb-3">WebRTC P2P File Transfer (Default: Memory Download)</h2>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-center">
          <div class="col-md-6">
            <input class="form-control" type="text" id="roomId" placeholder="Enter Room ID">
          </div>

          <div class="col-md-auto d-flex gap-2">
            <button class="btn btn-outline-primary" id="createBtn">Create</button>
            <button class="btn btn-primary" id="joinBtn">Join</button>
          </div>

          <div class="col-md">
            <span class="dot" id="connDot"></span>
            <span id="status" class="muted">Not Connected</span>
            <div id="roomHint" class="muted mt-1"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-3" id="chatSection" style="display:none;">
      <div class="card-body">
        <div id="chatBox" class="border rounded p-2 bg-white"></div>

        <div class="row g-2 mt-2">
          <div class="col">
            <input class="form-control" type="text" id="messageInput" placeholder="Type message">
          </div>
          <div class="col-auto">
            <button class="btn btn-success" id="sendBtn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-2">Send File (P2P)</h5>

        <input class="form-control" type="file" id="fileInput" />

        <div class="muted mt-2">
          Default: memory download (small/medium files). Large files will require disk saving (HTTPS/localhost).
        </div>

        <div class="mt-3">
          <div id="fileStatus" class="muted mb-2">Idle</div>

          <progress id="progressBar" value="0" max="100"></progress>

          <div class="d-flex flex-wrap gap-3 align-items-center mt-2">
            <div class="muted">
              Progress: <b id="progressText">0%</b>
            </div>
            <div id="speedText" class="muted">Speed: 0 MB/s</div>
            <div id="etaText" class="muted">Remaining: --</div>

            <div class="ms-auto d-flex gap-2">
              <button class="btn btn-outline-secondary btn-sm" id="pauseBtn" disabled>Pause</button>
              <button class="btn btn-primary btn-sm" id="resumeBtn" disabled>Resume</button>
              <button class="btn btn-outline-danger btn-sm" id="cancelBtn" disabled>Cancel</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Incoming popup -->
  <div id="modalBg">
    <div id="modal" class="border">
      <h3 class="h5">Incoming File</h3>
      <pre id="modalInfo" class="muted mb-3" style="white-space: pre-wrap;"></pre>

      <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-outline-danger" id="rejectBtn">Reject</button>
        <button class="btn btn-primary" id="acceptBtn">Accept</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
